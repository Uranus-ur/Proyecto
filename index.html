<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller Pro | Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('dt_roja.jpg'); 
            background-size: cover; 
            background-position: center; 
            min-height: 100vh; 
        }
    </style>
</head>
<body class="flex items-center justify-center p-6 text-white">

    <div class="bg-black/70 backdrop-blur-lg p-8 rounded-3xl w-full max-w-md border border-gray-700 shadow-2xl">
        <h2 class="text-3xl font-black mb-2 uppercase italic text-center">Registro</h2>
        <p class="text-gray-400 text-center mb-8">Ingresa tus datos para registrar tu vehículo.</p>
        
        <div class="space-y-4">
            <input type="text" id="nombre" placeholder="Nombre completo" class="w-full p-4 bg-gray-900 border border-gray-600 rounded-xl outline-none focus:border-red-600">
            <input type="text" id="placa" placeholder="PLACA" class="w-full p-4 bg-gray-900 border border-gray-600 rounded-xl outline-none focus:border-red-600 uppercase">
            <input type="tel" id="whatsapp" placeholder="WhatsApp" class="w-full p-4 bg-gray-900 border border-gray-600 rounded-xl outline-none focus:border-red-600">
            
            <button id="btnRegistrar" class="w-full bg-red-600 hover:bg-red-700 font-bold p-4 rounded-xl transition">
                REGISTRAR INGRESO
            </button>
        </div>
    </div>

<script>
    // 1. Inicializa la conexión solo una vez
    const SUPABASE_URL = 'https://dhorfbnoinvjinrkhjrr.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_cqQaWlVooUBALjkQ3E3kmw_WNrZ_GDc';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. Escucha el clic del botón
    document.getElementById('btnRegistrar').addEventListener('click', async () => {
        const nombre = document.getElementById('nombre').value;
        const placa = document.getElementById('placa').value;
        const whatsapp = document.getElementById('whatsapp').value;

        try {
            const { error } = await supabase
                .from('clientes')
                .insert([{ nombre, placa, whatsapp }]);

            if (error) throw error;
            
            alert('¡Registro exitoso!');
            // Opcional: limpiar inputs
        } catch (err) {
            console.error('Error al insertar:', err);
            alert('Hubo un error al guardar los datos.');
        }
    });
</script>
</body>
</html>
